<!DOCTYPE html>
<html lang="en">

<head>
    <title>BILLING</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" />
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="{{url_for('static', filename='index.js')}}"></script>
</head>

<body>

    <header>
        <div class="text-center container bg-primary">
            <a href="/home">
                <h1>
                    {{SNAME}}<br />
                    {{SADDRESS}}
                </h1>
            </a>
        </div>
    </header>
    <div id="billNo">Bill No: - {{bNo}}</div>
    <p contenteditable>NAME</p>
    <p contenteditable>ADDRESS</p>
    <div class="form-group row hide-while-print">
        <div class="col-sm-4">
            <input name="name" placeholder="Particular" class="form-control" list="particulars" autocomplete="off" />
            <datalist id="particulars">
                {% for val in LIST %}
                    {% if val[1]>0 %}
                    <option value="{{val[0]}}">{{val[0]}}:{{val[2]}}</option>
                    {% endif %}
                {% endfor %}
            </datalist>
        </div>
        <div class="col-sm-4">
            <input type="number" placeholder="Quantity" name="Quantity" class="form-control" autocomplete="off" />
        </div>
        <div class="col-sm-4">
            <input type="number" placeholder="Price" name="Price" class="form-control" autocomplete="off" />
        </div>
    </div>
    <div class="row hide-while-print">
        <button name="submit" class="col-sm-12 btn btn-success">SUBMIT</button>
    </div>
    <br />
    <br />
    <table class="table table-hover">
        <thead>
            <tr>
                <th>Sl No.</th>
                <th>Particulars</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
        <tbody>
        </tbody>
    </table>
    <div class="row hide-while-print">
        <button class="col-sm-12 btn btn-danger">TOTAL</button>
    </div>
</body>

</html>
